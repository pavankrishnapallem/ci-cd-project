services:
  database:
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    image: ${BACKEND_IMAGE:-goal-reminder-backend:test}
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://127.0.0.1:5000/api/users/me'').then(r=>process.exit(r.status===401?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

  frontend:
    image: ${FRONTEND_IMAGE:-goal-reminder-frontend:test}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:80/ >/dev/null || exit 1']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
