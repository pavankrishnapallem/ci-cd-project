name: build and push
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build frontend
        working-directory: ./frontend
        run: docker build -t goal-reminder-frontend:test .
        
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build backend
        working-directory: ./backend
        run: docker build -t goal-reminder-backend:test .

  push-images:
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: build and push frontend image
        working-directory: ./frontend
        run: docker build -t goal-reminder-frontend:${{ github.ref_name }} .
        run: docker push goal-reminder-frontend:${{ github.ref_name }}
      - name: build and push backend image
        working-directory: ./backend
        run: docker build -t goal-reminder-backend:${{ github.ref_name }} .
        run: docker push goal-reminder-backend:${{ github.ref_name }}

