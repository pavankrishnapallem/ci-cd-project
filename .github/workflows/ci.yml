name: build and push
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (e.g. v1.0.0)'
        required: true
        type: string
jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test -- --watchAll=false
        env:
          CI: true

  build-frontend:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build frontend
        working-directory: ./frontend
        run: docker build -t goal-reminder-frontend:test .

  build-backend:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build backend
        working-directory: ./backend
        run: docker build -t goal-reminder-backend:test .

  integration-test:
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Start stack with Docker Compose
        run: docker compose -f docker-compose.yml -f docker-compose.integration.yml up -d --build --wait
      - name: Run integration tests
        working-directory: ./integration
        run: npm run test:stack
        env:
          INTEGRATION_BASE_URL: http://localhost:3000
      - name: Stop stack
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.integration.yml down -v

  push-images:
    runs-on: ubuntu-latest
    needs: [integration-test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: build and push frontend image
        working-directory: ./frontend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/goal-reminder-frontend:${{ inputs.version }} .
      - run: docker push ${{ secrets.DOCKER_USERNAME }}/goal-reminder-frontend:${{ inputs.version }}
      - name: build and push backend image
        working-directory: ./backend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/goal-reminder-backend:${{ inputs.version }} .
      - run: docker push ${{ secrets.DOCKER_USERNAME }}/goal-reminder-backend:${{ inputs.version }}
