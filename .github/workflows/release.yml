name: docker-push
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (e.g. v1.0.0)'
        required: true
        type: string

jobs:
  push-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: build and push frontend image
        working-directory: ./frontend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/goal-reminder-frontend:${{ inputs.version }} .
      - run: docker push ${{ secrets.DOCKER_USERNAME }}/goal-reminder-frontend:${{ inputs.version }}
      - name: build and push backend image
        working-directory: ./backend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/goal-reminder-backend:${{ inputs.version }} .
      - run: docker push ${{ secrets.DOCKER_USERNAME }}/goal-reminder-backend:${{ inputs.version }}
